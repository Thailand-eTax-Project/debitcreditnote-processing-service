spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

logging:
  level:
    com.wpanther.debitcreditnote.processing: DEBUG
    org.hibernate.SQL: OFF

app:
  kafka:
    bootstrap-servers: kafka-broker:9093
    topics:
      debitcreditnote-processed: debitcreditnote.processed.cdc-test
      dlq: debitcreditnote.processing.dlq.cdc-test
      saga-command-debit-credit-note: saga.command.debit-credit-note.cdc-test
      saga-compensation-debit-credit-note: saga.compensation.debit-credit-note.cdc-test
      saga-reply-debit-credit-note: saga.reply.debit-credit-note.cdc-test

camel:
  springboot:
    name: debitcreditnote-processing-camel-cdc-test
    main-run-controller: false
