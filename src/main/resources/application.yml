server:
  port: 8089

spring:
  application:
    name: debitcreditnote-processing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:debitcreditnoteprocess_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  transaction:
    default-timeout: 30

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

camel:
  springboot:
    name: debitcreditnote-processing-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

app:
  parsing:
    timeout-seconds: 10
    max-concurrent: 300
  debitcreditnote:
    default-due-date-days: 30
  outbox:
    cleanup:
      retention-days: 7
      cron: "0 0 2 * * *"
  camel:
    retry:
      max-redeliveries: 3
      redelivery-delay-ms: 1000
      backoff-multiplier: 2.0
      max-redelivery-delay-ms: 10000
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumers:
      max-poll-records: 100
      count: 3
    topics:
      debitcreditnote-processed: debitcreditnote.processed
      dlq: debitcreditnote.processing.dlq
      saga-command-debitcreditnote: saga.command.debitcreditnote
      saga-compensation-debitcreditnote: saga.compensation.debitcreditnote
      saga-reply-debitcreditnote: saga.reply.debitcreditnote

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.wpanther.debitcreditnote.processing: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
